document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

-if>\n<span style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:{{ chromeTextColor }};\">Diagnostic Sensoriel<\u002Fspan>\n<\u002Fdiv>\n\n<div data-no-print=\"{{ true }}\" style=\"position:fixed;top:34px;right:40px;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.12em;color:{{ chromeTextColor }};opacity:{{ chromeOpacity }};transition:opacity .5s ease;\">{{ stepLabel }}<\u002Fdiv>\n\n<sc-if value=\"{{ showQuestion }}\" hint-placeholder-val=\"{{ false }}\">\n<div data-no-print=\"{{ true }}\" style=\"position:fixed;top:0;left:0;width:100%;height:3px;background:rgba(20,20,20,.07);z-index:5;\">\n<div style=\"height:100%;background:#141414;width:{{ progressPct }}%;transition:width .5s cubic-bezier(.4,0,.2,1);\"><\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<div key=\"{{ step }}\" style=\"width:100%;max-width:{{ stageMaxWidth }}px;animation:scScreenIn .55s cubic-bezier(.2,.8,.2,1) both;\">\n\n<sc-if value=\"{{ showIntro }}\" hint-placeholder-val=\"{{ true }}\">\n\n  <sc-if value=\"{{ introIsA }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"text-align:center;display:flex;flex-direction:column;align-items:center;gap:28px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(20,20,20,.45);\">Kiip. — Diagnostic de marque<\u002Fdiv>\n    <h1 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(40px,6vw,68px);line-height:1.08;margin:0;max-width:820px;letter-spacing:-.01em;\">Votre marque a-t-elle encore des choses à raconter&nbsp;?<\u002Fh1>\n    <p style=\"font-size:18px;line-height:1.65;color:rgba(20,20,20,.62);max-width:480px;margin:0;\">Un diagnostic stratégique, en 10 réflexions, pour révéler le potentiel encore inexploité de votre marque.<\u002Fp>\n    <button type=\"button\" onclick=\"{{ onStart }}\" style=\"margin-top:12px;padding:17px 34px;background:#141414;color:#fff;border:none;bo    <\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid rgba(20,20,20,.08);border-radius:20px;padding:30px;box-shadow:0 30px 70px -34px rgba(20,20,20,.35);display:flex;flex-direction:column;gap:20px;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:rgba(20,20,20,.4);\">Aperçu du profil<\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:16px;opacity:.55;filter:blur(.2px);\">\n        <div style=\"display:flex;flex-direction:column;gap:6px;\">\n          <div style=\"display:flex;justify-content:space-between;font-size:12px;color:rgba(20,20,20,.6);\"><span>ADN de marque<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;\">••<\u002Fspan><\u002Fdiv>\n          <div style=\"height:6px;border-radius:3px;background:rgba(20,20,20,.08);\"><div style=\"height:100%;width:71%;border-radius:3px;background:#141414;\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:6px;\">\n          <div style=\"display:flex;justify-content:space-between;font-size:12px;color:rgba(20,20,20,.6);\"><span>Attachement émotionnel<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;\">••<\u002Fspan><\u002Fdiv>\n          <div style=\"height:6px;border-radius:3px;background:rgba(20,20,20,.08);\"><div style=\"height:100%;width:54%;border-radius:3px;background:#141414;\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:6px;\">\n          <div style=\"display:flex;justify-content:space-between;font-size:12px;color:rgba(20,20,20,.6);\"><span>Potentiel d'extension<\u002Fspan><span style=\"font-family:'IBM Plex Mono',monospace;\">••<\u002Fspan><\u002Fdiv>\n          <div style=\"height:6px;border-radius:3px;background:rgba(20,20,20,.08);\"><div style=\"height:100%;width:38%;border-radius:3px;background:#141414;\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"text-align:center;font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:rgba(20,20,20,.35);border-top:1px dashed rgba(20,20,20,.12);padding-top:14px;\">Débloqué à la fin du diagnostic<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ introIsC }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"text-align:center;display:flex;flex-direction:column;align-items:center;gap:30px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(244,243,241,.45);\">Kiip. — Diagnostic de marque<\u002Fdiv>\n    <h1 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(42px,6.4vw,72px);line-height:1.08;margin:0;max-width:760px;letter-spacing:-.01em;\">Votre marque a-t-elle encore des choses à raconter&nbsp;?<\u002Fh1>\n    <p style=\"font-size:18px;line-height:1.65;color:rgba(244,243,241,.6);max-width:480px;margin:0;\">Un diagnostic stratégique, en 10 réflexions, pour révéler le potentiel encore inexploité de votre marque.<\u002Fp>\n    <button type=\"button\" onclick=\"{{ onStart }}\" style=\"margin-top:12px;padding:17px 34px;background:#F4F3F1;color:#141414;border:none;border-radius:100px;font-size:15px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:10px;transition:transform .2s ease;\" style-hover=\"transform:translateY(-2px);\">Commencer le diagnostic <span style=\"font-family:'IBM Plex Mono',monospace;\">→<\u002Fspan><\u002Fbutton>\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;color:rgba(244,243,241,.4);\">3 minutes · Aucune donnée personnelle requise<\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n\n<\u002Fsc-if>\n\n<sc-if value=\"{{ showTiming }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"display:flex;flex-direction:column;align-items:center;gap:38px;text-align:center;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(20,20,20,.45);\">Avant de commencer<\u002Fdiv>\n  <h2 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(30px,4vw,42px);margin:0;\">Comment ça fonctionne<\u002Fh2>\n  <div style=\"display:flex;gap:16px;flex-wrap:wrap;justify-content:center;\">\n    <div style=\"background:#fff;border:1px solid rgba(20,20,20,.08);border-radius:16px;padding:26px 30px;min-width:160px;display:flex;flex-direction:column;gap:6px;\">\n      <div style=\"font-family:'Instrument Serif',serif;font-size:36px;\">3<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:rgba(20,20,20,.45);\">MINUTES<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid rgba(20,20,20,.08);border-radius:16px;padding:26px 30px;min-width:160px;display:flex;flex-direction:column;gap:6px;\">\n      <div style=\"font-family:'Instrument Serif',serif;font-size:36px;\">10<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:rgba(20,20,20,.45);\">RÉFLEXIONS<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff;border:1px solid rgba(20,20,20,.08);border-radius:16px;padding:26px 30px;min-width:160px;display:flex;flex-direction:column;gap:6px;\">\n      <div style=\"font-family:'Instrument Serif',serif;font-size:36px;\">0<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.1em;color:rgba(20,20,20,.45);\">DONNÉE PERSONNELLE<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <p style=\"font-size:16px;line-height:1.65;color:rgba(20,20,20,.6);max-width:460px;margin:0;\">Répondez intuitivement à chaque réflexion. Il n'y a pas de bonne ou de mauvaise réponse — seulement une image plus précise de votre marque.<\u002Fp>\n  <button type=\"button\" onclick=\"{{ onTimingContinue }}\" style=\"padding:17px 34px;background:#141414;color:#fff;border:none;border-radius:100px;font-size:15px;font-weight:500;cursor:pointer;transition:transform .2s ease;\" style-hover=\"transform:translateY(-2px);\">Continuer →<\u002Fbutton>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ showSector }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"display:flex;flex-direction:column;align-items:center;gap:34px;text-align:center;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(20,20,20,.45);\">Personnalisation<\u002Fdiv>\n  <h2 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(28px,3.8vw,38px);margin:0;\">Quel est votre secteur d'activité&nbsp;?<\u002Fh2>\n  <p style=\"font-size:14px;line-height:1.6;color:rgba(20,20,20,.5);max-width:440px;margin:0;\">Cette information personnalise uniquement vos recommandations finales — elle n'influence jamais votre score, et n'est enregistrée à aucun moment de cette étape.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:12px;width:100%;max-width:560px;\">\n    <sc-for list=\"{{ sectorOptions }}\" as=\"sec\" hint-placeholder-count=\"9\">\n      <button type=\"button\" onclick=\"{{ sec.onClick }}\" style=\"padding:18px 14px;border-radius:14px;border:1.5px solid {{ sec.borderColor }};background:{{ sec.bg }};color:{{ sec.fg }};cursor:pointer;font-size:14px;font-weight:500;transform:{{ sec.transform }};transition:all .25s cubic-bezier(.3,.7,.3,1);\">{{ sec.label }}<\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ showQuestion }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"display:flex;flex-direction:column;align-items:center;gap:40px;text-align:center;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(20,20,20,.4);\">Réflexion {{ questionNumber }} / 10<\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:10px;align-items:center;\">\n    <h2 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(28px,4vw,40px);line-height:1.28;max-width:680px;margin:0;\">{{ currentQuestion.text }}<\u002Fh2>\n    <sc-if value=\"{{ currentQuestion.hasSub }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.06em;color:rgba(20,20,20,.4);\">{{ currentQuestion.sub }}<\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <div style=\"display:flex;flex-direction:column;gap:12px;width:100%;max-width:520px;\">\n    <sc-for list=\"{{ scaleOptions }}\" as=\"opt\" hint-placeholder-count=\"5\">\n      <button type=\"button\" onclick=\"{{ opt.onClick }}\" style=\"display:flex;align-items:center;justify-content:space-between;padding:19px 26px;border-radius:14px;border:1.5px solid {{ opt.borderColor }};background:{{ opt.bg }};color:{{ opt.fg }};cursor:pointer;font-size:16px;font-weight:500;transform:{{ opt.transform }};transition:all .25s cubic-bezier(.3,.7,.3,1);width:100%;box-sizing:border-box;\">\n        <span>{{ opt.label }}<\u002Fspan>\n        <span style=\"width:20px;height:20px;border-radius:50%;border:1.5px solid {{ opt.dotBorder }};background:{{ opt.dotBg }};flex-shrink:0;\"><\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ showAnalyzing }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"display:flex;flex-direction:column;align-items:center;gap:26px;text-align:center;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:rgba(20,20,20,.4);\">Kiip. Diagnostic<\u002Fdiv>\n  <div style=\"display:flex;gap:9px;\">\n    <span style=\"width:9px;height:9px;border-radius:50%;background:#141414;display:inline-block;animation:scPulse 1.1s ease-in-out infinite;animation-delay:0s;\"><\u002Fspan>\n    <span style=\"width:9px;height:9px;border-radius          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <p style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:11px;color:rgba(20,20,20,.4);text-align:center;margin:0;\">Ces supports sont des pistes, pas des objectifs — le format le plus pertinent dépend de votre stratégie de marque.<\u002Fp>\n  <\u002Fdiv>\n\n  <div data-report-page=\"{{ true }}\" style=\"background:#fff;border:1px solid rgba(20,20,20,.1);box-shadow:0 20px 50px -34px rgba(20,20,20,.35);border-radius:6px;width:100%;max-width:780px;padding:56px 48px;box-sizing:border-box;display:flex;flex-direction:column;align-items:center;text-align:center;justify-content:center;gap:20px;\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(20,20,20,.45);\">Prochaine étape<\u002Fdiv>\n    <h1 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:34px;margin:0;line-height:1.2;\">Et maintenant ?<\u002Fh1>\n    <p style=\"font-size:15px;line-height:1.65;color:rgba(20,20,20,.65);max-width:480px;margin:0;\">Chaque marque possède une histoire, un positionnement et des ambitions qui lui sont propres. Lors de ce diagnostic personnalisé de 30 minutes, nous analyserons ensemble votre marque afin d'identifier les extensions les plus cohérentes avec votre univers.<\u002Fp>\n    <div style=\"display:flex;flex-direction:column;align-items:center;gap:10px;margin-top:6px;\">\n      <img src=\"30c9538c-43ee-410f-b67e-cac6b7cd4a4a\" alt=\"QR code vers Cal.com\" style=\"width:130px;height:130px;display:block;\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;line-height:1.5;color:rgba(20,20,20,.45);max-width:300px;\">Scannez ce QR Code pour réserver votre diagnostic personnalisé.<\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:12px;padding-top:16px;border-top:1px solid rgba(20,20,20,.08);width:100%;max-width:420px;\">\n      <div style=\"font-family:'Instrument Serif',serif;font-style:italic;font-size:15px;line-height:1.45;color:rgba(20,20,20,.55);\">\"Les marques les plus fortes ne vendent pas davantage de produits. Elles construisent davantage d'univers.\"<\u002Fdiv>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;letter-spacing:.06em;color:rgba(20,20,20,.4);margin-top:6px;\">— L'équipe Kiip<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <button data-no-print=\"{{ true }}\" type=\"button\" onclick=\"{{ goFinal }}\" style=\"padding:17px 34px;background:#141414;color:#fff;border:none;border-radius:100px;font-size:15px;font-weight:500;cursor:pointer;transition:transform .2s ease;margin-top:10px;\" style-hover=\"transform:translateY(-2px);\">Voir la prochaine étape →<\u002Fbutton>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<sc-if value=\"{{ showFinal }}\" hint-placeholder-val=\"{{ false }}\">\n<div style=\"display:flex;flex-direction:column;align-items:center;gap:22px;text-align:center;\">\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.16em;text-transform:uppercase;color:rgba(244,243,241,.45);\">Et ensuite ?<\u002Fdiv>\n  <h1 style=\"font-family:'Instrument Serif',serif;font-weight:400;font-size:clamp(34px,5vw,52px);margin:0;line-height:1.15;max-width:640px;\">Poursuivons votre diagnostic.<\u002Fh1>\n  <p style=\"font-size:18px;line-height:1.65;color:rgba(244,243,241,.7);max-width:520px;margin:6px 0 0;font-family:'Instrument Serif',serif;font-style:italic;\">Imaginez votre marque dans six mois — prolongée dans un objet que vos clients gardent, offrent, et ressentent.<\u002Fp>\n  <p style=\"font-size:16px;line-height:1.75;color:rgba(244,243,241,.55);max-width:520px;margin:14px 0 0;\">Chaque marque possède une histoire, un positionnement et des ambitions qui lui sont propres. Lors de ce diagnostic personnalisé de 30 minutes, nous analyserons ensemble votre marque afin d'identifier les extensions les plus cohérentes avec votre univers.<\u002Fp>\n\n  <div style=\"display:flex;gap:14px;flex-wrap:wrap;justify-content:center;margin-top:22px;\">\n    <button type=\"button\" onclick=\"{{ onBook }}\" disabled=\"{{ isSending }}\" style=\"padding:16px 30px;background:#F4F3F1;color:#141414;border:none;border-radius:100px;font-size:15px;font-weight:500;cursor:pointer;display:inline-flex;align-items:center;gap:10px;transition:transform .2s ease,opacity .2s ease;opacity:{{ sendingOpacity }};\" style-hover=\"transform:translateY(-2px);\">{{ bookLabel }} <span style=\"font-family:'IBM Plex Mono',monospace;\">→<\u002Fspan><\u002Fbutton>\n  <\u002Fdiv>\n\n  <sc-if value=\"{{ hasBookingStatus }}\" hint-placeholder-val=\"{{ false }}\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:.04em;color:rgba(244,243,241,.6);margin-top:6px;max-width:440px;\">{{ bookingStatusText }}<\u002Fdiv>\n  <\u002Fsc-if>\n\n  <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10px;letter-spacing:.08em;color:rgba(244,243,241,.3);margin-top:30px;\">Kiip. Sàrl — Extensions sensorielles en marque blanche<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1440, &quot;height&quot;: 900}, &quot;introVariant&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;A&quot;, &quot;options&quot;: [&quot;A&quot;, &quot;B&quot;, &quot;C&quot;], &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Style&quot;}}\">\nconst SCALE_LABELS = [\"Pas du tout\", \"Faiblement\", \"Partiellement\", \"Majoritairement\", \"Totalement\"];\n\nconst SECTORS = [\"Mode & prêt-à-porter\", \"Décoration & Maison\", \"Cosmétique & Beauté\", \"Hôtellerie & Spa\", \"Immobilier\", \"Automobile\", \"Retail\", \"Alimentaire\", \"Autre\"];\n\n// ---- Bibliothèque éditoriale : modifier ici pour ajuster le contenu du diagnostic ----\n\nconst QUESTIONS = [\n  { text: \"Votre marque raconte-t-elle une histoire suffisamment forte pour dépasser son produit principal ?\" },\n  { text: \"Si votre produit disparaissait demain, votre marque aurait-elle encore quelque chose d'unique à raconter ?\" },\n  { text: \"Vos clients achètent-ils uniquement un produit, ou adhèrent-ils à un véritable univers de marque ?\" },\n  { text: \"Votre marque continue-t-elle d'exister dans le quotidien de vos clients après l'achat ?\" },\n  { text: \"Votre portefeuille actuel laisse-t-il encore de la place pour des catégories de produits complémentaires ?\" },\n  { text: \"Lorsque vous imaginez vos prochaines innovations, cherchez-vous à renforcer l'expérience de marque autant que l'offre produit ?\" },\n  { text: \"Votre marque pourrait-elle naturellement s'exprimer à travers des objets que vos clients conserveraient longtemps ?\" },\n  { text: \"Votre marque possède-t-elle aujourd'hui une signature sensorielle réellement identifiable ?\", sub: \"visuelle · sonore · tactile · gustative · olfactive\" },\n  { text: \"Existe-t-il aujourd'hui une expérience que vos clients associent instinctivement à votre marque ?\" },\n  { text: \"Si vous pouviez renforcer durablement l'attachement à votre marque grâce à une nouvelle catégorie de produits cohérente avec votre univers, considéreriez-vous cette opportunité comme stratégique ?\" }\n];\n\n// groupes de questions (index 0-based) utilisés pour calculer les 3 indicateurs\nconst INDICATOR_GROUPS = {\n  adn: [0, 1, 6, 7],\n  attachement: [2, 3, 8],\n  potentiel: [4, 5, 9]\n};\n\nfunction interpret(kind, percent) {\n  const bands = {\n    adn: [\n      \"Votre identité reste aujourd'hui difficile à distinguer de vos concurrents.\",\n      \"Votre identité commence à se démarquer, sans être encore pleinement affirmée.\",\n      \"Votre identité constitue aujourd'hui l'un de vos principaux atouts.\"\n    ],\n    attachement: [\n      \"Vos clients vous choisissent encore davantage pour votre offre que pour ce que vous représentez.\",\n      \"Un attachement réel existe, mais reste encore fragile ou ponctuel.\",\n      \"Vos clients sont émotionnellement engagés bien au-delà du produit lui-même.\"\n    ],\n    potentiel: [\n      \"Le terrain est ouvert, mais aucune direction ne s'est encore imposée.\",\n      \"Plusieurs pistes d'extension semblent déjà cohérentes avec votre univers.\",\n      \"Votre marque réunit aujourd'hui les conditions rares d'une extension réussie.\"\n    ]\n  };\n  const i = percent >= 70 ? 2 : (percent >= 40 ? 1 : 0);\n  return bands[kind][i];\n}\n\nconst PRODUCTS = {\n  bougie: \"Bougie parfumée\",\n  diffuseur: \"Diffuseur à rotins\",\n  spray: \"Spray d'ambiance\",\n  eau_toilette: \"Eau de toilette\",\n  eau_parfum: \"Eau de parfum\",\n  brume_corporelle: \"Brume corporelle\"\n};\n\nconst PROFILES = [\n  {\n    key: 'emergente', min: 10, max: 15,\n    name: \"Marque Émergente\",\n    manifeste: \"Une identité encore à écrire — et c'est une bonne nouvelle.\",\n    citation: \"Toute grande marque a commencé par un espace vide à combler.\",\n    description: \"Votre marque remplit sa fonction, mais n'a pas encore construit de territoire émotionnel propre. C'est une page presque blanche : ni un problème, ni un retard — un point de départ avec un potentiel presque entier à explorer.\",\n    forces: [\"Une offre claire et bien positionnée\", \"Une base de clients qui vous fait confiance\", \"Une identité visuelle qui ne demande qu'à être prolongée\"],\n    opportunities: [\n      { title: \"Poser un premier ancrage sensoriel\", why: \"Un signal simple et récurrent suffit à commencer à exister au-delà du produit.\", supports: ['bougie', 'diffuseur'] },\n      { title: \"Donner une trace tangible à l'expérience d'achat\", why: \"Un objet que le client conserve prolonge le contact bien après la transaction.\", supports: ['bougie', 'spray'] },\n      { title: \"Clarifier ce que la marque évoque, avant de l'étendre\", why: \"Une identité mieux définie rend toute extension future plus cohérente.\", supports: ['eau_toilette', 'spray'] }\n    ],\n    challenge: \"Construire une première signature reconnaissable, avant d'envisager toute extension.\"\n  },\n  {\n    key: 'signature', min: 16, max: 20,\n    name: \"Marque Signature\",\n    manifeste: \"Une identité qui se dessine, encore trop discrète.\",\n    citation: \"On ne reconnaît pas une signature à sa taille, mais à sa constance.\",\n    description: \"Des éléments de personnalité émergent déjà — un ton, un style, des choix assumés. Mais ils restent dispersés, plus perçus en interne que ressentis par vos clients.\",\n    forces: [\"Des choix de marque affirmés\", \"Une cohérence visuelle en construction\", \"Une équipe consciente de son positionnement\"],\n    opportunities: [\n      { title: \"Relier les signaux existants en une expérience continue\", why: \"Ce qui est aujourd'hui fragmenté peut devenir un fil conducteur reconnaissable.\", supports: ['diffuseur', 'bougie'] },\n      { title: \"Installer un rituel simple entre deux achats\", why: \"Un geste régulier maintient la marque présente sans sollicitation directe.\", supports: ['spray', 'bougie'] },\n      { title: \"Rendre visible ce qui n'est aujourd'hui que ressenti\", why: \"Une signature identifiable transforme une impression diffuse en reconnaissance.\", supports: ['eau_toilette'] }\n    ],\n    challenge: \"Transformer une personnalité perçue en une signature réellement identifiable.\"\n  },\n  {\n    key: 'habitee', min: 21, max: 25,\n    name: \"Marque Habitée\",\n    manifeste: \"Votre marque commence à vivre dans le quotidien de vos clients.\",\n    citation: \"Une marque habitée ne se consulte plus, elle se vit.\",\n    description: \"Vos clients ne se contentent plus d'acheter — ils intègrent votre marque à des habitudes. L'attachement existe, mais reste encore ponctuel plutôt que structuré.\",\n    forces: [\"Des clients qui reviennent par attachement, pas seulement par besoin\", \"Une expérience client déjà mémorable\", \"Un univers de marque tangible\"],\n    opportunities: [\n      { title: \"Multiplier les points de contact quotidiens\", why: \"Chaque nouveau point de contact renforce la fréquence de présence dans la vie du client.\", supports: ['diffuseur', 'spray'] },\n      { title: \"Transformer un usage isolé en rituel régulier\", why: \"La régularité consolide l'attachement mieux qu'un geste ponctuel.\", supports: ['bougie', 'spray'] },\n      { title: \"Donner un format à offrir à ceux qui ne vous connaissent pas encore\", why: \"Un objet que l'on partage étend votre univers au-delà de vos clients actuels.\", supports: ['eau_toilette', 'bougie'] }\n    ],\n    challenge: \"Structurer un attachement aujourd'hui réel, mais encore informel.\"\n  },\n  {\n    key: 'experience', min: 26, max: 30,\n    name: \"Marque Expérience\",\n    manifeste: \"L'expérience prime déjà sur le produit.\",\n    citation: \"Ce que l'on ressent se retient mieux que ce que l'on possède.\",\n    description: \"Vos clients parlent de vous en termes d'expérience, pas seulement de produit. Ce terrain émotionnel est solide — il reste à lui donner une forme durable, au-delà du moment d'achat.\",\n    forces: [\"Une expérience client différenciante\", \"Une capacité prouvée à générer de l'émotion\", \"Une marque qui inspire au-delà de sa catégorie\"],\n    opportunities: [\n      { title: \"Prolonger l'expérience après le moment d'achat\", why: \"L'émotion vécue en magasin ou en ligne peut continuer à exister chez le client.\", supports: ['diffuseur', 'bougie'] },\n      { title: \"Créer un objet qui incarne ce que l'on ressent chez vous\", why: \"Un support physique donne une forme tangible à une émotion jusque-là éphémère.\", supports: ['eau_parfum', 'bougie'] },\n      { title: \"Faire de chaque client un vecteur de votre univers\", why: \"Un objet que l'on porte ou que l'on offre étend votre expérience à de nouveaux publics.\", supports: ['eau_parfum', 'brume_corporelle'] }\n    ],\n    challenge: \"Donner une forme durable à une expérience aujourd'hui vécue, mais éphémère.\"\n  },\n  {\n    key: 'collection', min: 31, max: 35,\n    name: \"Marque Collection\",\n    manifeste: \"Plusieurs univers cohabitent déjà sous votre marque.\",\n    citation: \"Une collection n'est pas une somme de produits, c'est une histoire déclinée.\",\n    description: \"Votre marque a déjà prouvé qu'elle pouvait s'exprimer sous plusieurs formes. Le prochain enjeu n'est plus de convaincre, mais de structurer une déclinaison cohérente plutôt que des initiatives isolées.\",\n    forces: [\"Une capacité déjà démontrée à décliner votre offre\", \"Une identité suffisamment forte pour porter plusieurs formats\", \"Une base de clients réceptive à la nouveauté\"],\n    opportunities: [\n      { title: \"Structurer une gamme plutôt que des initiatives isolées\", why: \"Une collection cohérente a plus d'impact que des lancements ponctuels non reliés.\", supports: ['bougie', 'diffuseur', 'spray'] },\n      { title: \"Couvrir plusieurs usages d'un même univers\", why: \"Différents formats permettent de toucher différents moments du quotidien.\", supports: ['eau_toilette', 'brume_corporelle'] },\n      { title: \"Créer un format pensé pour être offert\", why: \"Un ensemble cohérent se prête naturellement au cadeau, et donc à la recommandation.\", supports: ['eau_parfum', 'bougie'] }\n    ],\n    challenge: \"Passer d'initiatives ponctuelles à une gamme pensée comme un tout.\"\n  },\n  {\n    key: 'sensorielle', min: 36, max: 40,\n    name: \"Marque Sensorielle\",\n    manifeste: \"Votre identité a déjà une texture, un ton, une présence.\",\n    citation: \"Ce qui se ressent avant de se comprendre s'installe plus durablement.\",\n    description: \"Votre marque possède déjà des repères sensoriels reconnaissables. Ce terrain, rarement occupé par vos concurrents, constitue un avantage concurrentiel encore largement sous-exploité.\",\n    forces: [\"Des repères sensoriels déjà identifiables\", \"Une marque difficile à confondre avec une autre\", \"Un avantage concurrentiel rarement occupé\"],\n    opportunities: [\n      { title: \"Étendre la signature sensorielle existante à un nouveau sens\", why: \"Ce qui fonctionne visuellement ou tactilement peut s'exprimer autrement.\", supports: ['eau_parfum', 'diffuseur'] },\n      { title: \"Ancrer cette signature dans un objet durable\", why: \"Un ancrage sensoriel gagne en impact lorsqu'il est incarné dans un objet que l'on garde.\", supports: ['bougie', 'brume_corporelle'] },\n      { title: \"Protéger cette signature en la rendant propriétaire\", why: \"Une signature développée sur mesure devient un actif de marque, pas seulement une caractéristique.\", supports: ['eau_parfum'] }\n    ],\n    challenge: \"Faire de cette signature sensorielle un actif de marque à part entière.\"\n  },\n  {\n    key: 'iconique', min: 41, max: 45,\n    name: \"Marque Iconique\",\n    manifeste: \"Votre marque est reconnue avant même d'être expliquée.\",\n    citation: \"Ce qui est iconique n'a plus besoin d'être justifié — seulement prolongé.\",\n    description: \"Vous avez atteint un niveau de reconnaissance où votre marque est identifiée en un instant. La question n'est plus de construire une identité, mais de choisir judicieusement où et comment la prolonger.\",\n    forces: [\"Une reconnaissance immédiate, sans effort de justification\", \"Une légitimité à s'étendre au-delà de votre cœur de métier\", \"Une communauté de clients qui vous associe déjà à un statut\"],\n    opportunities: [\n      { title: \"Choisir une extension à la hauteur de votre statut\", why: \"Une marque iconique ne peut se permettre une extension anodine — chaque choix doit renforcer le récit.\", supports: ['eau_parfum', 'bougie'] },\n      { title: \"Créer un objet que l'on montre autant qu'on l'utilise\", why: \"Pour une marque iconique, l'objet devient un signe de reconnaissance à part entière.\", supports: ['diffuseur', 'eau_parfum'] },\n      { title: \"Transformer votre notoriété en présence physique durable\", why: \"La notoriété se consomme vite ; une présence sensorielle, elle, s'installe dans la durée.\", supports: ['brume_corporelle', 'bougie'] }\n    ],\n    challenge: \"Choisir, parmi toutes les extensions possibles, celle qui honore votre statut plutôt que de le diluer.\"\n  },\n  {\n    key: 'heritage', min: 46, max: 50,\n    name: \"Marque Héritage\",\n    manifeste: \"Votre marque porte déjà une histoire que peu peuvent revendiquer.\",\n    citation: \"L'héritage ne se décrète pas — il se prolonge, génération après génération.\",\n    description: \"Peu de marques atteignent ce niveau de profondeur narrative et d'attachement. Le risque n'est plus l'oubli, mais l'immobilisme : ne pas transmettre cet héritage sous des formes nouvelles.\",\n    forces: [\"Une histoire de marque rare et difficile à imiter\", \"Un attachement qui traverse les générations de clients\", \"Une légitimité culturelle installée\"],\n    opportunities: [\n      { title: \"Transmettre l'héritage sous une forme contemporaine\", why: \"Un patrimoine de marque gagne à être réinterprété plutôt que simplement conservé.\", supports: ['eau_parfum', 'bougie'] },\n      { title: \"Créer un objet-mémoire pour vos clients historiques\", why: \"Vos clients de longue date attendent des gestes qui reconnaissent leur fidélité.\", supports: ['bougie', 'eau_toilette'] },\n      { title: \"Ouvrir l'héritage à une nouvelle génération de clients\", why: \"Une extension sensorielle bien pensée peut rendre un patrimoine accessible sans le dénaturer.\", supports: ['diffuseur', 'spray'] }\n    ],\n    challenge: \"Réinterpréter votre héritage sans jamais le trahir.\"\n  }\n];\n\nconst BOOKING_URL = \"https://cal.com/kenny-cretin-kiip/premier-echange?user=kenny-cretin-kiip&layout=mobile\";\n\n// ---- Envoi automatique du diagnostic via Resend (route serveur) ----\n// Le diagnostic tourne entièrement dans le navigateur : il ne peut jamais appeler\n// Resend directement    }, 550);\n  }\n\n  selectSector(value) {\n    this.setState({ sector: value });\n    clearTimeout(this._sectorTimer);\n    this._sectorTimer = setTimeout(() => {\n      this.setState(s => ({ step: s.step + 1 }));\n    }, 450);\n  }\n\n  componentWillUnmount() {\n    clearTimeout(this._advanceTimer);\n    clearTimeout(this._analyzeTimer);\n    clearTimeout(this._sectorTimer);\n  }\n\n  computeScore() {\n    return this.state.answers.reduce((a, b) => a + (b || 0), 0);\n  }\n\n  getProfile(score) {\n    return PROFILES.find(p => score >= p.min && score <= p.max) || PROFILES[0];\n  }\n\n  computeIndicators(answers) {\n    const pct = (group) => {\n      const vals = group.map(i => answers[i] || 0);\n      const avg = vals.reduce((a, b) => a + b, 0) / vals.length;\n      return Math.round(avg * 20);\n    };\n    const adnPct = pct(INDICATOR_GROUPS.adn);\n    const attachPct = pct(INDICATOR_GROUPS.attachement);\n    const potPct = pct(INDICATOR_GROUPS.potentiel);\n    return [\n      { label: \"ADN de marque\", percent: adnPct, interpretation: interpret('adn', adnPct), borderLeft: 'none' },\n      { label: \"Attachement émotionnel\", percent: attachPct, interpretation: interpret('attachement', attachPct), borderLeft: '1px solid rgba(20,20,20,.08)' },\n      { label: \"Potentiel d'extension\", percent: potPct, interpretation: interpret('potentiel', potPct), borderLeft: '1px solid rgba(20,20,20,.08)' }\n    ];\n  }\n\n  todayISO() {\n    const d = new Date();\n    return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');\n  }\n\n  buildPdfFilename() {\n    return 'Diagnostic personnalisé - Kiip';\n  }\n\n  saveDiagnosticRecord(payload) {\n    try {\n      const key = 'kiip_diagnostic_history';\n      const existing = JSON.parse(localStorage.getItem(key) || '[]');\n      existing.push(payload);\n      localStorage.setItem(key, JSON.stringify(existing.slice(-50)));\n    } catch (e) { /* localStorage indisponible — on ignore silencieusement */ }\n  }\n\n  buildAnswersText(payload) {\n    return QUESTIONS.map((q, i) => {\n      const val = payload.answers[i];\n      const label = val ? SCALE_LABELS[val - 1] : 'Sans réponse';\n      return (i + 1) + '. ' + label + ' (' + (val || 0) + '/5)';\n    }).join('\\n');\n  }\n\n  isValidEmail(value) {\n    return /^[^\\s@]+@[^\\s@]+\\.[^\\s@]+$/.test(String(value || '').trim());\n  }\n\n  // Construit le rapport PDF (2 pages) entièrement côté client avec jsPDF, puis\n  // le retourne en base64 — aucune dépendance serveur pour cette étape, aucun\n  // problème de rendu cross-origin (le logo est déjà embarqué en base64).\n  buildReportPdfBase64(profile, indicators) {\n    const { jsPDF } = window.jspdf;\n    const doc = new jsPDF({ unit: 'mm', format: 'a4' });\n    const marginX = 20;\n    const pageW = 210;\n    const contentW = pageW - marginX * 2;\n    let y = 22;\n\n    const ink = [20, 20, 20];\n    const inkSoft = [90, 90, 90];\n\n    try { doc.addImage(KIIP_LOGO_B64, 'PNG', marginX, y - 10, LOGO_W_MM, LOGO_H_MM); } catch (e) {}\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(9);\n    doc.setTextColor(140, 140, 140);\n    doc.text('Préparé par Kiip. Sàrl · ' + this.todayISO(), pageW - marginX, y - 4, { align: 'right' });\n\n    y += 16;\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(9);\n    doc.setTextColor(...inkSoft);\n    doc.text('RAPPORT DE DIAGNOSTIC DE MARQUE', marginX, y);\n\n    y += 11;\n    doc.setFont('times', 'bold');\n    doc.setFontSize(26);\n    doc.setTextColor(...ink);\n    doc.text(profile.name, marginX, y);\n\n    y += 9;\n    doc.setFont('times', 'italic');\n    doc.setFontSize(13);\n    doc.setTextColor(90, 90, 90);\n    const manifesteLines = doc.splitTextToSize(profile.manifeste, contentW);\n    doc.text(manifesteLines, marginX, y);\n    y += manifesteLines.length * 6 + 6;\n\n    doc.setDrawColor(220, 220, 220);\n    doc.line(marginX, y, pageW - marginX, y);\n    y += 9;\n\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(9);\n    doc.setTextColor(...inkSoft);\n    doc.text('SYNTHÈSE', marginX, y);\n    y += 8;\n\n    const colW = contentW / 3;\n    indicators.forEach((ind, i) => {\n      const x = marginX + i * colW;\n      doc.setFont('helvetica', 'normal');\n      doc.setFontSize(7.5);\n      doc.setTextColor(...inkSoft);\n      doc.text(ind.label.toUpperCase(), x, y);\n      doc.setFont('times', 'bold');\n      doc.setFontSize(20);\n      doc.setTextColor(...ink);\n      doc.text(ind.percent + '%', x, y + 9);\n    });\n    y += 18;\n\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(10.5);\n    doc.setTextColor(60, 60, 60);\n    const descLines = doc.splitTextToSize(profile.description, contentW);\n    doc.text(descLines, marginX, y);\n    y += descLines.length * 5.2 + 10;\n\n    // Page 2\n    doc.addPage();\n    y = 24;\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(9);\n    doc.setTextColor(...inkSoft);\n    doc.text('CE QUE RÉVÈLE VOTRE DIAGNOSTIC', marginX, y);\n    y += 10;\n\n    const halfW = contentW / 2 - 6;\n    let yForces = y, yOpp = y;\n    doc.setFont('helvetica', 'bold');\n    doc.setFontSize(9);\n    doc.setTextColor(...inkSoft);\n    doc.text('VOS FORCES', marginX, yForces);\n    doc.text('VOS OPPORTUNITÉS', marginX + halfW + 12, yOpp);\n    yForces += 7; yOpp += 7;\n\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(10);\n    doc.setTextColor(...ink);\n    profile.forces.forEach(f => {\n      const lines = doc.splitTextToSize('• ' + f, halfW);\n      doc.text(lines, marginX, yForces);\n      yForces += lines.length * 5 + 3;\n    });\n    profile.opportunities.forEach(o => {\n      const lines = doc.splitTextToSize('→ ' + o.title, halfW);\n      doc.text(lines, marginX + halfW + 12, yOpp);\n      yOpp += lines.length * 5 + 3;\n    });\n\n    y = Math.max(yForces, yOpp) + 6;\n    doc.setFillColor(...ink);\n    const boxLines = doc.splitTextToSize(profile.challenge, contentW - 16);\n    const boxH = boxLines.length * 5.4 + 16;\n    doc.roundedRect(marginX, y, contentW, boxH, 3, 3, 'F');\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(8);\n    doc.setTextColor(200, 200, 200);\n    doc.text('VOTRE PROCHAIN DÉFI', marginX + 8, y + 8);\n    doc.setFont('times', 'bold');\n    doc.setFontSize(11.5);\n    doc.setTextColor(244, 243, 241);\n    doc.text(boxLines, marginX + 8, y + 15);\n    y += boxH + 12;\n\n    doc.setFont('helvetica', 'normal');\n    doc.setFontSize(9);\n    doc.setTextColor(...inkSoft);\n    doc.text('OPPORTUNITÉS PRIORITAIRES', marginX, y);\n    y += 8;\n    profile.opportunities.forEach((o, i) => {\n      doc.setFont('times', 'bold');\n      doc.setFontSize(11);\n      doc.setTextColor(...ink);\n      doc.text((i + 1) + '. ' + o.title, marginX, y);\n      y += 5.5;\n      doc.setFont('helvetica', 'normal');\n      doc.setFontSize(9.5);\n      doc.setTextColor(90, 90, 90);\n      const whyLines = doc.splitTextToSize(o.why, contentW);\n      doc.text(whyLines, marginX, y);\n      y += whyLines.length * 4.6 + 2;\n      doc.setFont('helvetica', 'italic');\n      doc.setFontSize(8.5);\n      doc.setTextColor(120, 120, 120);\n      doc.text('Supports envisageables : ' + o.supportNames.join(' · '), marginX, y);\n      y += 9;\n    });\n\n    y += 4;\n    doc.setDrawColor(220, 220, 220);\n    doc.line(marginX, y, pageW - marginX, y);\n    y += 10;\n    doc.setFont('helvetica', 'bold');\n    doc.setFontSize(11);\n    doc.setTextColor(...ink);\n    doc.textWithLink('Réserver mon diagnostic personnalisé →', marginX, y, { url: BOOKING_URL });\n\n    return doc.output('datauristring').split(',')[1];\n  }\n\n  handleManualPrint() {\n    const originalTitle = document.title;\n    document.title = this.buildPdfFilename();\n    window.print();\n    document.title = originalTitle;\n  }\n\n  // Action 1 : \"Télécharger mon rapport\" — génère uniquement le PDF localement,\n  // aucun envoi. (alias de handleManualPrint, exposé séparément pour rester deux\n  // actions distinctes)\n\n  // Action 2 : \"Réserver mon diagnostic personnalisé\" — génère le PDF, l'envoie\n  // (en pièce jointe) au participant ET en copie à kenny@kiip.ch via la route\n  // serveur Resend (DIAGNOSTIC_EMAIL_ENDPOINT), puis n'ouvre Cal.com qu'une fois\n  // l'envoi confirmé. Ne déclenche jamais l'impression, aucun mailto, aucune\n  // ouverture de Mail.app.\n  handleBookOnly() {\n    const score = this.computeScore();\n    const profile = this.getProfile(score);\n    const indicators = this.computeIndicators(this.state.answers);\n    const payload = {\n      date: this.todayISO(),\n      sector: this.state.sector,\n      profileName: profile.name,\n      score,\n      indicators: indicators.map(i => ({ label: i.label, percent: i.percent })),\n      answers: this.state.answers.slice()\n    };\n    this.saveDiagnosticRecord(payload);\n\n    this.setState({ bookingStatus: 'sending' });\n\n    let pdfBase64;\n    try {\n      pdfBase64 = this.buildReportPdfBase64(profile, indicators);\n    } catch (e) {\n      this.setState({ bookingStatus: 'error' });\n      return;\n    }\n\n    const emailBody = {\n      sector: payload.sector || 'Non renseigné',\n      profileName: payload.profileName,\n      score: payload.score + '/50',\n      adnMarque: payload.indicators[0].percent + '%',\n      attachementEmotionnel: payload.indicators[1].percent + '%',\n      potentielExtension: payload.indicators[2].percent + '%',\n      reponses: this.buildAnswersText(payload),\n      pdfBase64,\n      pdfFilename: 'Diagnostic personnalisé - Kiip.pdf'\n    };\n\n    fetch(DIAGNOSTIC_EMAIL_ENDPOINT, {\n      method: 'POST',\n      headers: { 'Content-Type': 'application/json' },\n      body: JSON.stringify(emailBody)\n    })\n      .then(r => { if (!r.ok) throw new Error('send failed'); return r.json().catch(() => ({})); })\n      .then(() => {\n        // Envoi confirmé — on n'ouvre Cal.com qu'à ce moment-là.\n        this.setState({ bookingStatus: 'sent' });\n        window.open(BOOKING_URL, '_blank', 'noopener');\n        clearTimeout(this._bookingDoneTimer);\n        this._bookingDoneTimer = setTimeout(() => this.setState({ bookingStatus: 'idle' }), 9000);\n      })\n      .catch(() => {\n        // Échec de l'envoi — on n'ouvre pas Cal.com, jamais de repli mailto.\n        this.setState({ bookingStatus: 'error' });\n      });\n  }\n\n  renderVals() {\n    const { step, answers, sector } = this.state;\n    const introVariant = this.props.introVariant ?? 'A';\n\n    const questionIndex = (step >= 3 && step <= 12) ? step - 3 : null;\n    const showIntro = step === 0;\n    const showTiming = step === 1;\n    const showSector = step === 2;\n    const showQuestion = questionIndex !== null;\n    const showAnalyzing = step === 13;\n    const showResults = step === 14;\n    const showOpportunities = step === 15;\n    const showReport = step === 16;\n    const showFinal = step === 17;\n\n    const isDark = (showIntro && introVariant === 'C') || showFinal;\n    const pageBg = isDark ? '#121212' : '#FAFAF8';\n    const pageFg = isDark ? '#F4F3F1' : '#141414';\n    const chromeOpacity = showIntro ? 0 : 1;\n    const chromeTextColor = isDark ? 'rgba(244,243,241,.5)' : 'rgba(20,20,20,.45)';\n\n    let stepLabel = '';\n    if (showTiming) stepLabel = 'AVANT DE COMMENCER';\n    else if (showSector) stepLabel = 'PERSONNALISATION';\n    else if (showQuestion) stepLabel = 'RÉFLEXION ' + (questionIndex + 1) + ' / 10';\n    else if (showAnalyzing) stepLabel = 'ANALYSE';\n    else if (showResults) stepLabel = 'PROFIL DE MARQUE';\n    else if (showOpportunities) stepLabel = 'OPPORTUNITÉS';\n    else if (showReport) stepLabel = 'RAPPORT';\n    else if (showFinal) stepLabel = 'PROCHAINE ÉTAPE';\n\n    let stageMaxWidth = 640;\n    if (showTiming) stageMaxWidth = 680;\n    if (showSector) stageMaxWidth = 640;\n    if (showQuestion) stageMaxWidth = 640;\n    if (showResults) stageMaxWidth = 960;\n    if (showOpportunities) stageMaxWidth = 880;\n    if (showReport) stageMaxWidth = 820;\n    if (showFinal) stageMaxWidth = 640;\n    if (showIntro) stageMaxWidth = introVariant === 'B' ? 1040 : 720;\n\n    let currentQuestion = null, scaleOptions = [], progressPct = 0, questionNumber = null;\n    if (showQuestion) {\n      const q = QUESTIONS[questionIndex];\n      currentQuestion = { text: q.text, sub: q.sub || '', hasSub: !!q.sub };\n      questionNumber = questionIndex + 1;\n      const selected = answers[questionIndex];\n      progressPct = ((questionIndex) + (selected != null ? 1 : 0)) / 10 * 100;\n      scaleOptions = SCALE_LABELS.map((label, i) => {\n        const value = i + 1;\n        const isSelected = selected === value;\n        return {\n          value, label,\n          onClick: () => this.selectAnswer(questionIndex, value),\n          borderColor: isSelected ? '#141414' : 'rgba(20,20,20,.14)',\n          bg: isSelected ? '#141414' : '#ffffff',\n          fg: isSelected ? '#ffffff' : '#141414',\n          transform: isSelected ? 'scale(1.015)' : 'scale(1)',\n          dotBorder: isSelected ? '#ffffff' : 'rgba(20,20,20,.25)',\n          dotBg: isSelected ? '#ffffff' : 'transparent'\n        };\n      });\n    }\n\n    const sectorOptions = SECTORS.map(label => {\n      const isSelected = sector === label;\n      return {\n        label,\n        onClick: () => this.selectSector(label),\n        borderColor: isSelected ? '#141414' : 'rgba(20,20,20,.14)',\n        bg: isSelected ? '#141414' : '#ffffff',\n        fg: isSelected ? '#ffffff' : '#141414',\n        transform: isSelected ? 'scale(1.02)' : 'scale(1)'\n      };\n    });\n\n    const score = this.computeScore();\n    const needsProfile = showResults || showOpportunities || showReport || showFinal;\n    const rawProfile = needsProfile ? this.getProfile(score) : null;\n\n    let profile = null, indicators = [];\n    if (rawProfile) {\n      indicators = this.computeIndicators(answers);\n      profile = {\n        ...rawProfile,\n        opportunities: rawProfile.opportunities.map((o, i) => ({\n          ...o,\n          numberLabel: '0' + (i + 1),\n          supportNames: o.supports.map(k => PRODUCTS[k]),\n          supportsInline: o.supports.map(k => PRODUCTS[k]).join(' · ')\n        }))\n      };\n    }\n\n    const reportDate = new Date().toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });\n\n    return {\n      step, showIntro, showTiming, showSector, showQuestion, showAnalyzing, showResults, showOpportunities, showReport, showFinal,\n      introIsA: introVariant === 'A', introIsB: introVariant === 'B', introIsC: introVariant === 'C',\n      pageBg, pageFg, isDark, chromeOpacity, chromeTextColor, stepLabel, stageMaxWidth,\n      onStart: () => this.setState({ step: 1 }),\n      onTimingContinue: () => this.setState({ step: 2 }),\n      sectorOptions,\n      currentQuestion, questionNumber, scaleOptions, progressPct,\n      profile, indicators, score,\n      sector, hasSector: !!sector,\n      goOpportunities: () => this.setState({ step: 15 }),\n      goReport: () => this.setState({ step: 16 }),\n      backToOpportunities: () => this.setState({ step: 15 }),\n      onPrint: () => this.handleManualPrint(),\n      reportDate,\n      goFinal: () => this.setState({ step: 17 }),\n      downloadReport: () => this.handleManualPrint(),\n      onBook: () => this.handleBookOnly(),\n      isSending: this.state.bookingStatus === 'sending',\n      sendingOpacity: this.state.bookingStatus === 'sending' ? 0.6 : 1,\n      bookLabel: this.state.bookingStatus === 'sending' ? 'Envoi en cours…' : 'Réserver mon diagnostic personnalisé',\n      hasBookingStatus: this.state.bookingStatus !== 'idle',\n      bookingStatusText: this.state.bookingStatus === 'sent'\n        ? '✓ Diagnostic envoyé à Kiip. · Cal.com ouvert dans un nouvel onglet'\n        : (this.state.bookingStatus === 'error'\n          ? \"L'envoi a échoué — Cal.com ne s'ouvre pas tant que le diagnostic n'est pas transmis. Réessayez dans un instant.\"\n          : '')\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
